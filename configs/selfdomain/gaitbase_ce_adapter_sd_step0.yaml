data_cfg:
  dataset_name: CASIA-E
  dataset_root: /home/wjj/Datasets/CASIA-E-processed/opengait
  dataset_partition: ./datasets/CASIA-E/CASIA-E0_20.json
  num_workers: 1
  remove_no_gallery: false # Remove probe if no gallery for it
  test_dataset_name: CASIA-E

evaluator_cfg:
  enable_float16: true
  restore_ckpt_strict: true
  restore_hint: 1000
  save_name: GaitBase_ce_sd_step1
  sampler:
    batch_shuffle: false
    batch_size: 16
#    frames_num_fixed: 90 # fixed frames number for training
#    sample_type: fixed_unordered # fixed control input frames number, unordered for controlling order of input tensor; Other options: unfixed_ordered or all_ordered
    sample_type: all_ordered # all indicates whole sequence used to test, while ordered means input sequence by its natural order; Other options:   fixed_unordered
    frames_all_limit: 720 # limit the number of sampled frames to prevent out of memory

  metric: euc # cos
  transform:
    - type: BaseSilCuttingTransform

loss_cfg:
  - loss_term_weight: 1.0
    margin: 0.2
    type: TripletLoss
    log_prefix: triplet
  - loss_term_weight: 1.0
    scale: 16
    type: CrossEntropyLoss
    log_prefix: softmax
    log_accuracy: true
  - loss_term_weight: 1.0
    margin: 0.3
    type: KDLoss
    log_prefix: kd_loss
    log_accuracy: true
  - loss_term_weight: 1.0
    type: STALoss
    log_prefix: stability_loss
    log_accuracy: true
  - loss_term_weight: 1.0
    type: EDSNLoss
    log_prefix: edsn
    log_accuracy: true

model_cfg:
  model: GaitAdapter
  current_step: 1
  graph_cfg:
    hidden_dim: 256
    input_dim: 256
    meta_graph_vertex_num: 64
  backbone_cfg:
    type: ResNet9
    block: BasicBlock
    in_channel: 1
    channels: # Layers configuration for automatically model construction
      - 64
      - 128
      - 256
      - 512
    layers:
      - 1
      - 1
      - 1
      - 1
    strides:
      - 1
      - 2
      - 2
      - 1
    maxpool: false
  SeparateFCs:
    in_channels: 512
    out_channels: 256
    parts_num: 16
  ExpandHeads:
    class_num_list:
      - 20
    in_channels: 256
    parts_num: 16
  bin_num:
    - 16

task_optimizer_cfg:
  lr: 0.00035
  solver: Adam
  weight_decay: 0.0005

graph_optimizer_cfg:
  lr: 0.00035
  solver: Adam
  weight_decay: 0.0005

task_scheduler_cfg:
  gamma: 0.1
  milestones:
    - 1000
  scheduler: MultiStepLR

graph_scheduler_cfg:
  gamma: 0.1
  milestones:
    - 1000
  scheduler: MultiStepLR
trainer_cfg:
  enable_float16: true # half_percesion float for memory reduction and speedup
  fix_BN: false
  with_test: true
  log_iter: 100
  restore_ckpt_strict: false

  #optimizer and scheduler reset
  task_optimizer_reset: true
  graph_optimizer_reset: false
  task_scheduler_reset: false
  graph_scheduler_reset: false

  #step [0,1,2,3, ...]
  step_start_iteration:
    - 0
  restore_hint: ../checkpoints/GaitBase_ce_sd_step0-01000.pt
  save_iter: 1000
  test_iter: 1000
  save_name: GaitBase_ce_sd_step1
  sync_BN: true
  total_iter: 1000
  sampler:
    batch_shuffle: true
    batch_size:
      - 16 # TripletSampler, batch_size[0] indicates Number of Identity
      - 8 #                 batch_size[1] indicates Samples sequqnce for each Identity
    frames_num_fixed: 30 # fixed frames number for training
    frames_num_max: 40 # max frames number for unfixed training
    frames_num_min: 10 # min frames number for unfixed traing
    sample_type: fixed_unordered # fixed control input frames number, unordered for controlling order of input tensor; Other options: unfixed_ordered or all_ordered
    type: TripletSampler
  transform:
    - type: BaseSilCuttingTransform
      #trf_cfg:
      #  - type: BaseSilCuttingTransform
      #  - type: RandomRotate
      #    prob: 0.3
      #  - type: RandomErasing
      #    prob: 0.3
